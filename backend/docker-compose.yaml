services:
  postgres:
    image: postgres:16-alpine 
    container_name: test_db
    environment:
      POSTGRES_USER: postgres       
      POSTGRES_PASSWORD: 123 
      POSTGRES_DB: mydb           
    ports:
      - "5432:5432"               
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: always              

volumes:
  pgdata:
    
networks:
  backend: